name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\Current\Bin\MSBuild.exe"
          if (-not $msbuild) {
            Write-Error "MSBuild.exe was not found."
          }
          Split-Path $msbuild | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          dotnet restore EDForceFeedback.sln --packages .\packages

      - name: Build solution
        shell: pwsh
        run: |
          msbuild EDForceFeedback.sln /m /p:Configuration=Release /p:Platform=x64 /v:m
